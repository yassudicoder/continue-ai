<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #fafbff; color: #161c2d; position: relative; overflow: hidden;
    background-image:
      linear-gradient(rgba(37,99,235,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(37,99,235,.06) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .frame { position: absolute; inset: 28px; border: 1px solid rgba(37,99,235,.18); }
  .mk { position: absolute; width: 12px; height: 12px; border: 2px solid #2563eb; }
  .mk.tl { top: 22px; left: 22px; border-right: 0; border-bottom: 0; }
  .mk.tr { top: 22px; right: 22px; border-left: 0; border-bottom: 0; }
  .mk.bl { bottom: 22px; left: 22px; border-right: 0; border-top: 0; }
  .mk.br { bottom: 22px; right: 22px; border-left: 0; border-top: 0; }
  .wrap { position: absolute; inset: 0; padding: 78px 84px; display: flex; flex-direction: column; }
  .kicker { font: 700 16px ui-monospace, "SFMono-Regular", Menlo, monospace; letter-spacing: .22em; color: #5b6478; text-transform: uppercase; }
  .brand { display: flex; align-items: center; gap: 16px; margin-top: 14px; }
  .logo { width: 56px; height: 56px; border-radius: 13px; background: #2563eb; display: flex; align-items: center; justify-content: center; }
  .brandname { font-size: 40px; font-weight: 800; letter-spacing: -.02em; }
  h1 { font-size: 64px; line-height: 1.06; font-weight: 800; letter-spacing: -.03em; margin-top: 40px; max-width: 940px; }
  h1 .grad { background: linear-gradient(92deg, #2563eb, #7c3aed); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .flow { display: flex; align-items: center; gap: 18px; margin-top: 42px; font-size: 26px; font-weight: 700; }
  .pill { padding: 12px 22px; border-radius: 999px; background: #fff; border: 1px solid #e3e7f2; box-shadow: 0 10px 24px -16px rgba(26,33,64,.45); }
  .arrow { color: #2563eb; font-size: 30px; }
  .foot { margin-top: auto; display: flex; justify-content: space-between; align-items: center; font: 600 19px ui-monospace, Menlo, monospace; letter-spacing: .04em; color: #5b6478; }
  .foot b { color: #161c2d; }
  .tag { color: #2563eb; }
</style>
</head>
<body>
  <div class="frame"></div>
  <span class="mk tl"></span><span class="mk tr"></span><span class="mk bl"></span><span class="mk br"></span>
  <div class="wrap">
    <div class="kicker">FIELD NOTES · VOL.01 · CHROME EXTENSION</div>
    <div class="brand">
      <span class="logo"><svg width="34" height="34" viewBox="0 0 24 24"><path d="M19 14a1.6 1.6 0 0 1-1.6 1.6H8l-3 3V6.6A1.6 1.6 0 0 1 6.6 5h10.8A1.6 1.6 0 0 1 19 6.6z" fill="none" stroke="#fff" stroke-width="1.7" stroke-linejoin="round"/><path d="M9.5 10.2h5M9.5 12.2h3" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg></span>
      <span class="brandname">Continue AI</span>
    </div>
    <h1>Continue any AI chat — <span class="grad">on another model</span>, in one click.</h1>
    <div class="flow">
      <span class="pill">ChatGPT</span><span class="arrow">→</span>
      <span class="pill">Claude</span><span class="arrow">→</span>
      <span class="pill">Gemini</span>
    </div>
    <div class="foot">
      <span><b>Without losing context.</b> &nbsp;Local-first · no account.</span>
      <span class="tag">SCALE 1:1</span>
    </div>
  </div>
</body>
</html>
